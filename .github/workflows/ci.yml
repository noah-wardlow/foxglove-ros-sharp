name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore FoxgloveRosSharp.sln
      - name: Build
        run: dotnet build FoxgloveRosSharp.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test FoxgloveRosSharp.sln --configuration Release --no-build --verbosity normal
      - name: Pack
        run: dotnet pack src/FoxgloveRosSharp/FoxgloveRosSharp.csproj --configuration Release --no-build --output artifacts
